name: Build Test Application

on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  build:
    name: Build Test App
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        espidf_target:
          - esp32c3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Build Test Application with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: "latest" # trying latest pin to a known published image tag; see hub.docker.com/r/espressif/idf/tags
          target: ${{ matrix.espidf_target }}
          path: '.'
      - name: Upload files to artifacts for run-target job
        uses: actions/upload-artifact@v4
        with:
          name: test_app_bin_${{ matrix.espidf_target }}
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/example_test_app.bin
            build/example_test_app.elf
            build/flasher_args.json
          if-no-files-found: error
